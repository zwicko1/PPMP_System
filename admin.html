<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Procurement</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; margin: 0; }
        .navbar { background: #c14f3b; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar h2 { margin: 0; font-size: 1.2rem; }
        .logout-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .controls label { font-weight: 600; color: #333; margin-right: 10px; }
        .controls input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 1rem; width: 120px; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #f8f9fa; border-bottom: 2px solid #ddd; padding: 12px; text-align: left; color: #555; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .btn-allocate { background: #0d6efd; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500; font-family: inherit; }
        .btn-edit { background: #ffc107; color: #000; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500; font-family: inherit; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .modal input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .btn-save { background: #198754; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>🛡️ Administrator Dashboard</h2>
        <div>
            <span id="adminName" style="margin-right: 15px;"></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <h3 style="color: #c14f3b; margin: 0;">Sector Budget Allocations</h3>
            <div>
                <label>Viewing Fiscal Year:</label>
                <input type="number" id="yearFilter" min="2020" step="1" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
            </div>
        </div>
        
        <table id="sectorsTable">
            <thead>
                <tr>
                    <th>Sector / Unit</th>
                    <th style="text-align: right;">Allocated Budget (₱)</th>
                    <th style="text-align: center; width: 150px;">Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="text-align: center; padding: 20px; color: #666;">Loading data...</td></tr>
            </tbody>
            
            <tfoot id="tableFooter" style="display: none; background-color: #fff9f9; border-top: 3px solid #c14f3b;">
                <tr>
                    <td style="padding: 15px 12px; text-align: right; font-weight: 600; font-size: 1.1rem;">Total Allocated for University:</td>
                    <td id="totalBudgetValue" style="padding: 15px 12px; text-align: right; color: #c14f3b; font-weight: 700; font-size: 1.2rem;">₱ 0.00</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="modal-overlay" id="budgetModal">
        <div class="modal">
            <h3 id="modalSectorName" style="margin-top: 0; color: #333;"></h3>
            <p style="margin: 0; color: #666; font-size: 0.9rem;">Allocating for Fiscal Year <strong id="modalYearLabel"></strong></p>
            
            <input type="number" id="modalBudgetInput" placeholder="Enter amount (e.g. 1500000.00)" min="0" step="0.01" onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode === 46">
            
            <p id="modalError" style="color: red; font-size: 0.9rem; display: none; margin-top: 0;"></p>

            <div class="modal-btns">
                <button class="btn-cancel" id="closeModalBtn">Cancel</button>
                <button class="btn-save" id="saveBudgetBtn">💾 Save</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
